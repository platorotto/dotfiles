[colors]
background = #000000
background-alt = #373B41
foreground = #ffffff
primary = #ffffff
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = UbuntuNerdFont-Regular;2

modules-left = settings xworkspaces
modules-center = date
modules-right = battery wlan eth pulseaudio power

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/settings]
type = custom/text
content = ůįć≥
click-left = bash ~/Plato/settings.sh

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1

date = %d %b %H:%M

label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery

full-at = 100
low-at = 20

battery = BAT0
adapter = ADP1

format-charging = <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <ramp-capacity> <label-low>

label-charging = %{F#FFD700}ůĪźč %{F#FFFFFF}%percentage%%
label-discharging = %percentage%%
label-full = FULL
label-low = %percentage%%

ramp-capacity-0 = %{F#FD0000}ůįĀļ
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀľ
ramp-capacity-3 = ůįĀĹ
ramp-capacity-4 = ůįĀĺ
ramp-capacity-5 = ůįĀŅ
ramp-capacity-6 = ůįāÄ
ramp-capacity-7 = ůįāĀ
ramp-capacity-8 = ůįāā
ramp-capacity-9 = %{F#00FF00}ůįĀĻ

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#FD0000}Ôáę  ERROR

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = Ôáę  %essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = ůįąÄ %essid%

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

label-muted = ůįĚü MUTE
label-muted-foreground = #666

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ

click-right = pavucontrol

[module/power]
type = custom/text
content = ‚ŹĽ
click-left = bash ~/Plato/power.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
